name: Amapiano
options:
  bundleIdPrefix: com.djsly
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  SWIFT_VERSION: "5.9"
  DEVELOPMENT_TEAM: QGMAWHX827
targets:
  Amapiano:
    type: application
    platform: iOS
    sources:
      - Amapiano/Sources
    resources:
      - Amapiano/Resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.djsly.amapiano
      INFOPLIST_FILE: Amapiano/Resources/Info.plist
      CODE_SIGN_STYLE: Automatic
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      SUPPORTS_XR_DESIGNED_FOR: NO
    info:
      path: Amapiano/Resources/Info.plist
      properties:
        CFBundleName: Amapiano
        CFBundleDisplayName: Amapiano
        CFBundleShortVersionString: "1.4"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSupportsIndirectInputEvents: true
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
        NSBonjourServices:
          - _http._tcp
        UIBackgroundModes:
          - audio
